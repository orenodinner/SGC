version: 1
last_updated: 2026-04-23
decisions:
  - id: DEC-001
    topic: Desktop stack
    status: accepted
    decision: Use Electron + React + TypeScript + Vite
    rationale: Best balance for Windows desktop delivery, local-first implementation, Excel support, and long-running agent implementation.

  - id: DEC-002
    topic: Persistence
    status: accepted
    decision: Use SQLite as sole persistence layer in MVP
    rationale: Simple local-first storage with strong query capability for WBS, portfolio summaries, and roadmap range queries.

  - id: DEC-003
    topic: Dependency types
    status: accepted
    decision: MVP supports only finish-to-start dependencies with lag days
    rationale: Keeps scheduling logic manageable while covering the most common practical need.

  - id: DEC-004
    topic: Planning granularity
    status: accepted
    decision: Support day/week/month/quarter/year/FY views
    rationale: Product must cover both daily operation and long-term planning.

  - id: DEC-005
    topic: Fiscal year default
    status: accepted
    decision: Default FY start month is April
    rationale: Target user context is Japanese business planning.

  - id: DEC-006
    topic: Excel contract
    status: accepted
    decision: Tasks sheet is canonical for round-trip
    rationale: Minimizes ambiguity between human-friendly and machine-friendly sheets.

  - id: DEC-007
    topic: Collaboration scope
    status: accepted
    decision: MVP is single-user local-first only
    rationale: Reduces implementation complexity and user friction.

  - id: DEC-008
    topic: UI default language
    status: accepted
    decision: Japanese-first UI, but keep architecture i18n-ready
    rationale: Matches target user while avoiding future lock-in.

  - id: DEC-009
    topic: SQLite bootstrap implementation
    status: accepted
    decision: Phase 0/1 では SQL.js を同期 SQLite API として使い、main process からファイル永続化する
    rationale: ネイティブ addon 再ビルドを避けつつ、ローカル SQLite 互換ファイルと同期 API の要件を満たして着手速度を優先する。

  - id: DEC-010
    topic: Inbox persistence model
    status: accepted
    decision: Inbox は専用の system project `_INBOX` として保存し、通常の project list からは隠す
    rationale: `item.project_id` を nullable にせず既存スキーマを保ったまま、未計画タスクの保存と Home/Inbox 集計を実装できる。

  - id: DEC-011
    topic: Timeline drag target
    status: accepted
    decision: Phase 3 の timeline drag move / resize は startDate と endDate を持つ scheduled item のみに適用する
    rationale: due-only item まで同じ操作で動かすと scheduled 判定と dueDate の意味が曖昧になるため、まず ACC-006 / ACC-007 を満たす安全な対象に限定する。

  - id: DEC-012
    topic: Detail drawer scope
    status: accepted
    decision: Phase 3 の detail drawer は note / tags の編集を先に実装し、dependency / recurrence / history は placeholder を出して Phase 5 以降へ送る
    rationale: dependency モデルが未実装の段階でも drawer 自体の価値を先に出せ、Project Detail の編集導線を分割して安全に進められる。

  - id: DEC-013
    topic: Undo redo scope
    status: accepted
    decision: Phase 3 の undo/redo は `updateItem` 経由の field edit のみを対象にし、create / archive / hierarchy move は含めない
    rationale: Project Detail の主要編集ループを先に安定化しつつ、構造変更まで巻き戻す設計は後続の command 層導入時にまとめて扱う方が安全なため。

  - id: DEC-014
    topic: Electron production asset loading
    status: accepted
    decision: Electron production build の renderer asset は Vite `base: "./"` を使って相対パスで出力する
    rationale: `loadFile()` で開く `file://` 配下では `/assets/...` の絶対パスが壊れるため、desktop Playwright smoke と実運用の両方で相対 asset path を既定にする。

  - id: DEC-015
    topic: Inbox project assign behavior
    status: accepted
    decision: Inbox から project を割り当てた item は target project の root 直下へ移動し、末尾 sort order を採用する
    rationale: 未整理タスクは親階層を持たない前提で最小導線を優先し、割当時に既存 WBS 構造を壊さず project detail へ安全に載せるため。

  - id: DEC-016
    topic: Inbox date add behavior
    status: accepted
    decision: Inbox の日付追加は単日 picker で受け、選択日を `startDate` と `endDate` の両方へ保存して1日タスク化し、scheduled item は `_INBOX` に残ったままでも Home の Today / Overdue 集計へ含める
    rationale: due-only と range 入力を同時に持ち込むよりも最小編集導線を優先し、project 未割当のままでも計画済み item が Home から見えなくならないよう既存 `updateItem` と Home 集計の責務で一貫させるため。

  - id: DEC-017
    topic: Inbox tag add behavior
    status: accepted
    decision: Inbox のタグ追加は inline text field で受け、スペースまたはカンマ区切りの複数タグを `parseTagInput` と同じ正規化規則で保存する
    rationale: Project Detail の tag 編集と同じ入力規則へ寄せることで学習コストを増やさず、service API を増やさずに最小導線を追加できるため。

  - id: DEC-018
    topic: Portfolio summary risk calculation
    status: accepted
    decision: Phase 4 の portfolio summary query は `riskLevel` を project table の cached 値ではなく query 時に算出する
    rationale: Phase 4 の最初の縦切りでは portfolio UI と service 集計を先に成立させ、project 派生列の保存最適化は必要になった時点で後追いする方が安全なため。

  - id: DEC-019
    topic: Portfolio phase row default
    status: accepted
    decision: Portfolio expand の `主要 Phase` は project 直下の root-level `group` item を対象とし、task / milestone の root 行は phase row に含めない
    rationale: WBS の見出し用途と Portfolio の phase 概念を最小コストで一致させ、Phase 4 では明確な階層だけを expand 対象にして UI と query を単純に保つため。

  - id: DEC-020
    topic: Year and FY roadmap anchor semantics
    status: accepted
    decision: Year roadmap は選択年の 1月-12月を表示し、FY roadmap は表示年を fiscal year の開始年として扱う。既定の FY 開始月=4 では `FY2026` は `2026-04` から `2027-03` を意味する
    rationale: 年表示と FY 表示の month bucket domain を先に固定し、後続の header / layout / filter 実装で年ラベルの解釈がぶれないようにするため。

  - id: DEC-021
    topic: Initial roadmap renderer scope
    status: accepted
    decision: Phase 4 の最初の roadmap renderer は project row と root-level の dated item を month bucket 上へ表示し、quarter header / filter / deeper task expansion は後続スライスへ送る
    rationale: Year / FY view を早く開ける状態にしつつ、既存の project summary と project detail だけで安全に描画できる範囲へ絞って Phase 4 を縦切りで進めるため。

  - id: DEC-022
    topic: Roadmap quarter header semantics
    status: accepted
    decision: roadmap の quarter header は表示中の 12か月 bucket を 3か月ずつ区切った `Q1-Q4` を使う。Year view は暦年基準、FY view は fiscal year 開始月基準で quarter を割り当てる
    rationale: quarter renderer と month bucket renderer の責務を揃え、Year と FY で同じ UI 部品を使いながら quarter の意味だけを明確に切り替えられるようにするため。

  - id: DEC-023
    topic: Initial roadmap filter set
    status: accepted
    decision: roadmap の初期 filter は `all / overdue / milestone` の3つとし、`overdue` と `milestone` では条件に合う child row がある project row を文脈維持のため残す
    rationale: Phase 4 では最小の実用フィルタを先に提供し、project context を完全に失わずに roadmap 上で危険箇所や milestone だけへ素早く絞り込めるようにするため。

  - id: DEC-024
    topic: Initial portfolio filter set
    status: accepted
    decision: Portfolio の初期 filter は `all / overdue / week_milestone` の3つとし、`overdue` は `overdueCount >= 1`、`week_milestone` は `nextMilestoneDate` が今週内の project に絞る
    rationale: Phase 4 の portfolio table を危険案件確認と今週の節目確認の2用途へ最小コストで寄せ、追加 query を増やさず既存 summary contract だけで実用的な絞り込みを成立させるため。

  - id: DEC-025
    topic: Initial roadmap deeper expansion scope
    status: accepted
    decision: Roadmap の deeper task expansion は root-level `group` row から始め、同一 project detail に既に載っている descendant を再利用して inline 展開する。初期状態は collapsed とし、dated descendant とそれをつなぐ context group だけを表示対象にする
    rationale: Phase 4 の長期表示を崩さずに詳細確認導線を足すには、追加 query や virtualization より先に既存 detail data を使った最小 expand を入れる方が安全で、行数増加も明示操作時だけに限定できるため。

  - id: DEC-026
    topic: Initial dependency validation scope
    status: accepted
    decision: TASK-0501 では dependency persistence と基本 validation を先に入れ、同一 project 制約、自己参照禁止、archived item 禁止、重複 edge 禁止までを扱う。cycle detection と dependent shift は後続 task へ送る
    rationale: scheduler の本体ロジックを入れる前に DB 契約と service 境界を先に固定すると、detail drawer や import/export から再利用しやすく、validation の責務も小さく保てるため。

  - id: DEC-027
    topic: Dependency cycle detection scope
    status: accepted
    decision: TASK-0502 では dependency 作成時に同一 project の既存 dependency graph をたどり、successor から predecessor へ到達可能なら direct / indirect を問わず保存を拒否する。自動再スケジュールや UI 表示はこの slice では扱わない
    rationale: cycle を persistence 境界で防ぐと後続の dependent shift や Excel import が不正 graph を前提にしなくて済み、scheduler 本体より前に安全性を固定できるため。

  - id: DEC-028
    topic: Initial reschedule scope behavior
    status: accepted
    decision: TASK-0503 では reschedule scope を item update API に追加し、子孫を持つ item の timeline move で `single / with_descendants / with_dependents` のポップオーバーを出す。実動は `single` と `with_descendants` までとし、`with_dependents` は disabled 表示で次タスクへ送る
    rationale: scope selection を user-facing に先に見せつつ、複雑な dependency propagation を切り離して ACC-014 の descendants shift を小さな縦切りで成立させるため。

  - id: DEC-029
    topic: Initial dependent shift semantics
    status: accepted
    decision: TASK-0504 では `with_dependents` のときに編集中 item の subtree を同じ差分で保ったうえで、finish-to-start dependency を満たす最小の後ろ倒しだけを行い、`successor.startDate >= predecessor.endDate + lagDays + 1日` を calendar day で満たすように successor とその子孫を移動する。前倒しと working day 補正は扱わない
    rationale: dependency propagation を usable にしつつ、working day や bidirectional reschedule を後続タスクへ分離することで scheduler の初回実装を安全に保てるため。

  - id: DEC-030
    topic: Initial working day scope
    status: accepted
    decision: TASK-0505 では working day logic の適用範囲を dependency による自動後ろ倒しのみに限定し、既定の working day は `月〜金` とする。finish-to-start の earliest start 計算は `lagDays + 1` 営業日を使い、manual drag や direct date edit はこの slice では営業日補正しない
    rationale: scheduler の自動調整だけを先に営業日化すると、ユーザーが意図的に置いた週末日付を壊さずに ACC-013 の実務要件を満たせるため。

  - id: DEC-031
    topic: Initial Excel export contract scope
    status: accepted
    decision: Phase 6 の最初の slice では `.xlsx` writer より先に workbook contract を pure TypeScript で固定し、sheet 順序、`Tasks` 列順序、`DependsOn` のシリアライズ規則を test で守る。portfolio entity が未実装の間は `PortfolioCode` と `PortfolioName` を空文字で export する
    rationale: Excel round-trip は列契約の後戻りコストが高いため、writer 実装前に canonical contract を先に固定する方が安全で、既存データモデルに無い portfolio 列も暫定既定を明示して export 仕様をぶらさず進められるため。

  - id: DEC-032
    topic: Initial workbook writer scope
    status: accepted
    decision: TASK-0601 の最初の writer は project 単位の `.xlsx` を backend で生成し、`Tasks` を canonical data sheet として完全出力する。`Dashboard`、`Gantt_View`、`MasterData` は first slice では軽量な scaffold 内容に留め、凝った書式や印刷最適化は後続 slice へ送る
    rationale: 4-sheet workbook を早く実ファイルとして成立させるには、round-trip に必要な canonical sheet と最低限の人間向け sheet を先に出す方が安全で、非 canonical sheet の見た目最適化を同時に抱えない方が進行リスクが低いため。

  - id: DEC-033
    topic: Initial export trigger UX
    status: accepted
    decision: 初期 export 導線は Project Detail toolbar の `Excel Export` ボタンとし、押下時に OS の保存ダイアログを開く。既定ファイル名は project code を優先し、キャンセル時は state を変えない
    rationale: Excel export を最小スコープでユーザー操作へ接続するには、既に project context を持つ Project Detail から始めるのが最も自然で、保存先確認も OS 標準ダイアログに寄せる方が学習コストと実装リスクが低いため。

  - id: DEC-034
    topic: Initial import preview scope
    status: accepted
    decision: TASK-0602 の最初の slice では Project Detail toolbar の `Excel Import` から `.xlsx` を選び、canonical `Tasks` シートの dry-run preview を表示する。初期 preview は `new / update / error` 件数と行一覧までに限定し、commit と詳細 validation table は後続 slice へ送る
    rationale: import は commit を伴うため、まず preview のみを先に成立させて workbook 読み取りと既存データ照合を安全に固定した方が、Phase 6 の進行リスクを抑えつつ受け入れ試験の主経路を早く満たせるため。

  - id: DEC-035
    topic: Initial import commit scope
    status: accepted
    decision: TASK-0603 の最初の slice では preview 済み workbook を current project に対して apply し、`new / update` 行のみを反映する。`error` 行は skip し、更新対象は canonical `Tasks` の基本編集列に限定する。dependency import、rollback、project 横断 apply は後続 slice へ送る
    rationale: import commit を最小の安全な単位で成立させるには、preview と同じ project context の中で title/date/status/tag などの主要編集列だけを反映する方が実装と検証のリスクが低く、Excel round-trip の主要受け入れ試験もこの範囲で先に満たせるため。

  - id: DEC-036
    topic: Initial import validation detail shape
    status: accepted
    decision: validation table の最初の slice では preview row に field-level issue list を持たせ、error row で `列名: 理由` を複数表示する。grid 全体の別テーブル化や修正 UI は後続 slice へ送る
    rationale: import validation を実用化する最短手は、既存 preview row の中に invalid field をぶら下げて表示する形であり、layout を大きく増やさずに commit 前の判断材料を一段上げられるため。

  - id: DEC-037
    topic: Initial DependsOn import preview validation
    status: accepted
    decision: `DependsOn` の初期 import 対応は preview validation のみに留め、token は current project の既知 `RecordId` を参照している場合だけ有効とする。new row 同士の依存、dependency commit、cycle check 連携は後続 slice へ送る
    rationale: dependency import を一気に commit まで通すより、まず preview 時点で不正参照と構文揺れを止める方が安全で、既存 export 契約を崩さずに Phase 6 の validation 範囲を段階的に広げられるため。

  - id: DEC-038
    topic: Initial DependsOn import commit scope
    status: accepted
    decision: `DependsOn` の初期 commit は preview を通過した current project 内の既知 predecessor だけを successor 単位で置き換えて保存する。new row 同士の dependency 解決、preview 時点の cycle 警告、`LastModifiedAt` warning は後続 slice とする
    rationale: Excel round-trip の実用性を上げるには、まず export 済み dependency を workbook から戻せることが重要であり、current project の既知 predecessor に限定すれば edge 置換を小さな差分で安全に導入できるため。

  - id: DEC-039
    topic: Initial LastModifiedAt preview warning
    status: accepted
    decision: `LastModifiedAt` の初期対応は preview row の warning 表示に限定し、`action` は変えず apply も止めない。workbook 側 timestamp が既存 item の `updatedAt` より古い update row にだけ warning chip を出す
    rationale: 競合の存在を先に見せつつ commit フローは止めない方が現行の local-first 運用と相性がよく、preview contract と UI に小さな warning 配列を足すだけで安全に段階導入できるため。

  - id: DEC-040
    topic: Initial DependsOn cycle preview warning
    status: accepted
    decision: `DependsOn` の初期 cycle 対応は import preview の warning に限定し、row を error へ落とさず apply も直接は止めない。current project の既存 dependency graph に import row の predecessor 集合を当て込んで cycle になる update row に warning chip を出す
    rationale: 既存の commit 側 cycle 防止を壊さずに、apply 前の気付きだけを小さい差分で追加できるため。warning と error を分けることで token 不正と graph リスクの責務も明確に保てる。

  - id: DEC-041
    topic: Initial import preview filter set
    status: accepted
    decision: import preview panel の最初の絞り込みは `all / warning / error` の3つに限定し、filter は renderer 内の local state で扱う。`warning` は warnings を1件以上持つ row、`error` は `action=error` row のみを表示する
    rationale: preview contract を増やさずに validation の見通しを上げる最短手であり、Phase 6 の dry-run 体験を小さい差分で改善できるため。

  - id: DEC-042
    topic: Workbook-local temporary RecordId for import
    status: accepted
    decision: new row 同士の dependency import では `tmp_` で始まる workbook-local temporary `RecordId` を許可し、preview では current project の既知 item ID と同列の参照対象として扱う。commit 時は同じ import で作成した item の実 ID へ解決してから dependency を保存する
    rationale: current project 既知 ID だけに限定すると workbook 内で新規追加した行同士を 1 回の import で接続できず、Excel round-trip の実用性が落ちるため。prefix を固定すると update row との誤判定も避けやすい。

  - id: DEC-043
    topic: Initial import warning summary
    status: accepted
    decision: import preview panel の最初の warning 集約は renderer 内の local aggregation に限定し、既存 preview row contract はそのまま使う。summary では warning を持つ row の `row number / title / warning reason` を上部へ一覧表示し、row table と filter は併存させる
    rationale: backend contract を広げずに stale workbook や dependency cycle の注意点を先に拾えるようにする最短手であり、Phase 6 の import 体験を小さな差分で改善できるため。

  - id: DEC-044
    topic: Initial browser fallback import preview
    status: accepted
    decision: browser fallback の最初の import 対応は file picker からの preview と current project への commit までに限定し、preview contract は desktop と同じものを使う。初期対象 workbook は SGC export が出す store-only ZIP を主対象とし、browser fallback commit では canonical `Tasks` の基本編集列と `Tags / ParentRecordId` だけを apply し、`DependsOn` は扱わない
    rationale: browser mode でも dry-run 後に current project へ戻せないと round-trip の価値が薄いため。一方で dependency import まで含めると browser fallback 固有の state 管理が広がるので、まず item 編集列だけを apply して scope を小さく保つ方が安全なため。

  - id: DEC-045
    topic: Initial import warning-only list
    status: accepted
    decision: import preview panel では warning summary に加えて dedicated warning-only list を置き、warning を持つ row だけを独立一覧で確認できるようにする。初期実装では renderer 側の local aggregation で組み立て、追加 contract や専用 backend query は持たない
    rationale: warning summary は注意行の存在把握には十分だが、preview row table に戻らず warning 行だけを続けて確認したい場面があるため。renderer 内の既存 preview data を再利用すれば、scope を広げずに確認導線を一段改善できる。

  - id: DEC-046
    topic: Browser fallback dependency import disclosure
    status: accepted
    decision: browser fallback の import preview では `DependsOn` を preview/validation の対象として残しつつ、apply 時には反映しないことを panel 上で明示する。初期実装では preview contract に capability flag を持たせ、preview panel と commit notice の文言だけで方針を伝える
    rationale: browser fallback では item 編集列だけを安全に apply する方針が既にある一方、現状は UI からその差分が見えず誤解しやすい。capability flag を一つ追加して表示するだけなら scope を広げずに期待値を揃えられるため。

  - id: DEC-047
    topic: Initial warning-only table shape
    status: accepted
    decision: import preview の warning-only 導線は compact list ではなく dedicated table を採用し、`row / project / title / warning` を横比較できる形にする。warning summary は注意行の先読み用途として残し、warning-only table は本体 preview table より軽い比較面として併存させる
    rationale: warning 行だけを複数件続けて確認したい場面では、list より列構造を持つ table の方が見落としが少なく、filter で本体 table を切り替える前の確認効率も高いため。

  - id: DEC-048
    topic: Initial detail drawer dependency editor scope
    status: accepted
    decision: detail drawer の最初の dependency editor は selected item を successor とする `finish_to_start` 追加と、linked dependency の削除に限定する。先行タスク候補は同一 project の非 archived item から選び、browser mode では editor を出さず unavailable note のみを表示する
    rationale: dependency UI を最小の実務価値で先に成立させるには、selected item へ先行タスクを付ける導線から始めるのが最も分かりやすく、双方向の full editor を一度に抱えるより実装と検証のリスクが低いため。

  - id: DEC-049
    topic: Initial timeline keyboard edit scope
    status: accepted
    decision: timeline の keyboard 操作は初期 slice では focused bar / marker に限定し、`Alt+Left/Right` を move、`Alt+Shift+Left/Right` を right-edge resize とする。resize は task / group の bar のみを対象にし、milestone marker では move のみ許可する
    rationale: pointer 依存の timeline 編集に対する最小の accessibility 改善としては、selected item や drag state を複雑に広げず、focused bar に対する明示的なショートカットを追加するのが最も安全で検証範囲も小さいため。

  - id: DEC-050
    topic: Initial import compare preview scope
    status: accepted
    decision: import preview の差分比較は `action=update` row のみに出し、field / before / after の inline compare として panel 内で完結させる。初期実装の比較対象は canonical `Tasks` の主要編集列に限定し、new row / error row や差分比較専用画面は持たない
    rationale: import preview の判断材料を一段上げつつ、別画面や commit ロジック変更を増やさずに小さな縦切りで実装できるため。

  - id: DEC-051
    topic: Initial timeline focus traversal scope
    status: accepted
    decision: timeline の focus traversal は初期 slice では visible な bar / marker だけを対象にし、`ArrowUp/ArrowDown` で DOM 順の前後 item へ focus を移す。focus 移動時は selected item を追従させるが、dialog や grid への traversal までは広げない
    rationale: keyboard 編集の次に必要な accessibility 改善としては、visible timeline item 間の移動を先に閉じるのが最小で安全であり、pointer 操作や dialog のフォーカス管理を一度に広げずに Playwright で主経路を守れるため。

  - id: DEC-052
    topic: Initial reschedule dialog keyboard scope
    status: accepted
    decision: reschedule scope dialog の keyboard 初期対応は `ArrowLeft/ArrowRight` による候補移動、`Enter/Space` による確定、`Escape` によるキャンセルに限定する。dialog を開いた時点では既定選択の `with_descendants` に focus を置き、Tab 順や周辺画面への focus trap まではこの slice では扱わない
    rationale: timeline keyboard 編集の次に必要なのは reschedule 分岐を pointer なしでも確定できることだが、完全な dialog focus trap まで一度に広げると scope が大きくなるため。候補選択と確定/キャンセルだけを先に閉じる方が安全で E2E でも守りやすい。

  - id: DEC-053
    topic: Browser fallback dependency import parity
    status: accepted
    decision: browser fallback の import でも preview を通過した `DependsOn` を current project へ apply する。初期対象は current project の既知 item ID と同一 workbook 内の `tmp_*` temporary ID で解決できる finish-to-start edge に限定し、dependency editor 自体は引き続き desktop only のままとする
    rationale: browser fallback だけ dependency import を skip すると preview/commit の期待値が分かれ、round-trip 契約も無駄に分岐するため。browser 側には既に preview validation と import helper があり、current project scope に限れば小さい差分で parity を上げられるため。

  - id: DEC-054
    topic: Initial local backup slice
    status: accepted
    decision: TASK-0801 の最初の slice では `Backup now` による manual backup create と recent list のみを提供し、restore は後続 slice へ送る。desktop では `userData/data/../backups` に timestamp 付き SQLite copy を保存し、browser fallback は lightweight snapshot download に留める
    rationale: hardening の最小価値はまず「今の DB を退避できること」であり、restore 導線まで同時に抱えると不可逆操作や UI 分岐が増えて進行リスクが高いため。manual backup create と recent list だけなら小さい差分で value を出せる。

  - id: DEC-055
    topic: Initial backup restore preview scope
    status: accepted
    decision: TASK-0801 の次 slice では actual restore の前に read-only restore preview を提供し、recent backup から `file name / created at / size / project count / item count / latest updatedAt` を確認できるようにする。preview は backup snapshot を読むだけで、current DB には変更を加えない
    rationale: restore は不可逆確認や再起動導線を含みやすく scope が広がるため、まずは backup 内容を安全に検査できる preview を先に成立させる方が hardening を縦切りで進めやすい。

  - id: DEC-056
    topic: Initial backup restore apply scope
    status: accepted
    decision: TASK-0801 の restore apply は preview 済み backup に対する confirm 付き restore を最初の slice とし、desktop では apply 前に current DB の safety backup を自動作成する。restore 後は app state を再読込し、browser fallback では in-memory snapshot restore で同等導線を提供する
    rationale: restore 自体は価値が高い一方で不可逆性があるため、confirm と safety backup を最初から組み込む方が安全で、desktop と browser fallback の capability 差分も小さく保てるため。

  - id: DEC-057
    topic: Initial auto backup and retention scope
    status: accepted
    decision: TASK-0801 の auto backup 初期 slice では app bootstrap 時に local day あたり1回だけ `sgc-auto-backup-*` を自動作成し、`sgc-auto-backup-*` 系列のみに最新7件 retention を適用する。manual backup (`sgc-backup-*`) と safety backup (`sgc-safety-backup-*`) はこの slice では削除しない
    rationale: retention を全 backup に一度に適用すると既存の manual/safety backup を暗黙に消すことになり、hardening slice としては破壊的影響が大きい。auto 系列だけを独立 prefix で管理すれば、起動時保護と保持上限を追加しつつ既存運用を壊さずに進められるため。

  - id: DEC-058
    topic: Initial recovery prompt scope
    status: accepted
    decision: TASK-0805 の最初の slice では DB 初期化または bootstrap 失敗時でも app window は開き、通常 workspace の代わりに recovery screen を表示する。recovery screen では startup error と recent backup list と restore preview だけを提供し、destructive restore 実行は後続 slice に送る
    rationale: DB 異常時に完全に起動不能だと backup 導線自体が見えず hardening 価値が薄い。一方で recovery mode から即 restore を実装すると main process の degraded state と restart 制御まで広がるため、まずは prompt と preview だけを成立させる方が小さく安全である。

  - id: DEC-059
    topic: Recovery restore execution model
    status: accepted
    decision: recovery screen の restore は live DB 未初期化でも file-level restore を許可し、desktop では current DB file の safety backup を切ってから backup file を差し戻す。restore 成功後は OS プロセス relaunch ではなく current session を normal startup context と workspace service へ再初期化して通常 workspace に戻す
    rationale: degraded recovery mode から即座に OS プロセス再起動まで抱えるより、file restore と current session の再初期化へ責務を絞る方が小さな縦切りで安全に閉じられ、renderer 側でも restore 後の state refresh をそのまま再利用できるため。

  - id: DEC-060
    topic: Initial project detail virtualization scope
    status: accepted
    decision: `TASK-0802` の最初の slice では Project Detail の WBS / timeline row 描画だけを virtualization 対象にし、両ペインで同一の visible window を共有する。row 高さは 58px 固定、overscan は 6 row を既定とし、scroll continuity は top / bottom spacer で維持する
    rationale: large list 対応で最も先に効くのは Project Detail の左右同時描画コストであり、Portfolio / Roadmap まで一度に広げるより scope を小さく保てる。fixed row height と shared window に寄せれば既存の同期スクロールや timeline focus traversal を壊しにくく、Playwright でも DOM 行数を安定して検証できるため。

  - id: DEC-061
    topic: Initial roadmap virtualization scope
    status: accepted
    decision: `TASK-0802` の次 slice では Roadmap の quarter header / month header は常時描画のまま残し、body row だけを virtualization 対象にする。row 高さは 62px 固定、overscan は 6 row を既定とし、Project Detail と同じ helper を再利用する
    rationale: Roadmap では sticky な header を保ったまま body row の描画コストだけを下げるのが最小で、Project Detail で導入した fixed-row virtualization helper をそのまま流用できる。header まで virtualize しないことで click target と時系列認知を崩さずに large-row 対応を閉じられるため。

  - id: DEC-062
    topic: Initial installer pipeline scope
    status: accepted
    decision: `TASK-0804` の初期 installer pipeline は MSI や setup wizard ではなく、`scripts/build.ps1` から生成する Windows 向け portable zip artifact とする。artifact には bundled Electron runtime、`dist/`、`dist-electron/`、必要最小限の runtime `node_modules/`、`Launch SGC.cmd` を含める
    rationale: Phase 8 の done 条件はまず build artifact を再現可能に出せることであり、ネイティブ installer まで一度に抱えるより portable zip を自動生成する方が scope を小さく保てる。Electron runtime と app root を同梱した zip なら、ローカル配布と smoke 検証の両方をすぐ成立させられるため。

  - id: DEC-063
    topic: Initial reschedule dialog focus restore scope
    status: accepted
    decision: `TASK-0803` の次 slice では reschedule scope dialog に完全な focus trap は入れず、`Escape` または scope 確定で閉じた後に、開く前に操作していた timeline item へ focus を戻すことを先に保証する
    rationale: accessibility の残課題として最初に効くのは、dialog を閉じた後に keyboard 操作位置を見失わないことだが、Tab 循環まで一度に広げると scope が大きくなるため。focus restore を先に閉じれば、既存の timeline keyboard edit と自然につながる。

  - id: DEC-064
    topic: Initial reschedule dialog tab loop scope
    status: accepted
    decision: `TASK-0803` の closing slice では、reschedule scope dialog の `Tab / Shift+Tab` を dialog 内の既存 button 群だけで循環させる。背景要素の inert 化や汎用 modal focus manager までは入れない
    rationale: まず必要なのは keyboard 利用時に dialog から focus が漏れないことだが、アプリ全体の modal 基盤へ広げると scope が大きい。既存の scope button と cancel button だけで循環させれば、最小の変更で acceptance を満たせる。

  - id: DEC-065
    topic: Initial recurrence rule model scope
    status: accepted
    decision: `TASK-0701` の first slice では recurrence rule を item 単位の単一 row として保存し、raw `rrule_text` と `next_occurrence_at` だけを永続化する。保存対象は task item のみとし、保存時に item 側 `isRecurring` を true、削除時に false へ同期する
    rationale: まず必要なのは recurring generation より前の安定した永続化境界であり、UI 形式や occurrence 展開を先に決め打ちすると後戻りが大きい。raw text と next occurrence だけを先に固定すれば、後続 slice は generator と editor を独立に積み上げられる。

  - id: DEC-066
    topic: Initial recurring generation trigger and rule advance scope
    status: accepted
    decision: `TASK-0702` の first slice では recurring task が `done` へ遷移した時だけ次の occurrence を1件生成する。generation は rule の `next_occurrence_at` を開始日に使い、rule 自体は完了済み item から新しい occurrence へ移す。rule advance の初期対応は `FREQ=WEEKLY`, `FREQ=MONTHLY`, `FREQ=DAILY;BYDAY=MO,TU,WE,TH,FR` に限定する
    rationale: background scheduler や multi-occurrence 先行生成まで一度に抱えると scope が大きいため。完了時に1件だけ作る方式なら item ごとに 1 rule を保ったまま value を出せ、既存の item update 導線にも最小差分で載せられる。

  - id: DEC-067
    topic: Initial WBS template save scope
    status: accepted
    decision: `TASK-0703` の first slice では project 内の selected root item 1件とその非 archived descendants を `kind=wbs` template として保存し、list できる状態までを扱う。保存対象は hierarchy と WBS 再利用に必要な基本編集列に限定し、schedule / progress / dependency / recurrence / apply flow は後続 slice へ送る
    rationale: template 機能を一度に apply まで広げると UI と domain の責務が大きくなるため。まず save contract と persistence を先に固定すれば、後続の project template / apply flow / recurrence UI を安全に積み上げられる。

  - id: DEC-068
    topic: Initial WBS template apply scope
    status: accepted
    decision: `TASK-0703` の apply 側は saved `kind=wbs` template を target project の root 直下へ subtree として append する MVP に限定する。復元対象は hierarchy と基本編集列のみとし、status / dates / dependency / recurrence は初期値へ戻して project template 化は後続 slice へ送る
    rationale: save と同じ task の中で apply まで閉じるには、target project root append に scope を絞るのが最も安全で、既存 WBS rebalance と tag attach を再利用しやすい。schedule や dependency まで持ち込むと import/recurrence と責務が重なるため、この slice では骨格の再利用だけを先に成立させる。

  - id: DEC-069
    topic: Initial project template save scope
    status: accepted
    decision: `TASK-0704` の first slice では selected project 1件を `kind=project` template として保存し、list できる状態までを扱う。保存対象は project-level の基本編集列 (`name / description / ownerName / priority / color`) と、非 archived root item / descendants の hierarchy + 基本編集列に限定し、project create/apply は後続 slice へ送る
    rationale: project template を一度に create/apply まで広げると project metadata と subtree restore の責務が大きくなるため。まず save/list contract と persistence を先に固定すれば、後続 slice では target project 作成と WBS insert を安全に積み上げられる。

  - id: DEC-070
    topic: Initial project template apply scope
    status: accepted
    decision: `TASK-0704` の apply 側は saved `kind=project` template から新しい project を1件生成し、その project 配下へ saved root item / descendants を復元する MVP に限定する。復元対象は project-level の `name / description / ownerName / priority / color` と、item-level の `type / title / note / priority / assigneeName / tags / estimateHours / durationDays` のみとし、`code / status / schedule / progress / dependency / recurrence` は初期値へ戻す
    rationale: project template を実用化する最短手は project-level metadata と root subtree 再利用をまとめて小さく閉じることであり、source project の schedule や dependency まで持ち込むと recurrence / import と責務が重なる。新規 project 採番と item 初期化に限定すれば、既存 WBS template apply の実装資産を再利用しつつ安全に縦切りできる。
